<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup Form | BY HASSAN RAO </title>
    <link rel="stylesheet" href="assets/css/signup.css">
</head>
<body>
    <div class="main">
        <div class="form">
            <h1>Signup Form</h1>
            <p>it's quick and easy.</p>
            <form action="#">
                <input type="text" class="input" name="name" placeholder="Enter Name" required>
                <input type="email" class="input" name="email" placeholder="Enter Email" required>
                <input type="password" class="input" name="newPassowrd" placeholder="Enter A Password" required>
                <input type="password" class="input" name="confirmPassword" placeholder="Confirm Password" required>

                <input type="submit" value="Signup">
            </form>
            <p class="login-link">Already a member? <a href="index.html">Login Here</a></p>
        </div>
    </div>
</body>
</html>
